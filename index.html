<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Stats, roster, and clan war results for the EBK Clash Royale clan."
    />
    <title>EBK · Clash Royale Clan</title>
    <script>
      // Apply the saved theme before first paint to avoid a flash. Light is the
      // default, so we only add the class when the visitor explicitly chose dark.
      try {
        if (localStorage.theme === "dark") document.documentElement.classList.add("dark");
      } catch {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
